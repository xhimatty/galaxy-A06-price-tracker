name: Daily Price Tracker

on:
  schedule:
    - cron: "0 9 * * *"   # Runs every day at 9:00 UTC
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # disable default token so we can push manually

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas playwright
          playwright install chromium

      - name: Run price tracker
        run: xvfb-run python price_tracker.py

      - name: Upload debug screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: screenshot_*.png

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add price_tracker_data.csv price_tracker.log
          git commit -m "Update data and log [skip ci]" || echo "No changes to commit"
          git push https://xhimatty:${{ secrets.GITHUB_TOKEN }}@github.com/xhimatty/galaxy-A06-price-tracker.git HEAD:main